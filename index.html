<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정수와 유리수 탐구 도구 - 와우중학교</title>
    <style>
        /* [공통 레이아웃 스타일] */
        :root {
            --sidebar-width: 240px;
            --primary-color: #4da6ff;
            --secondary-color: #2c3e50;
            --bg-color: #f8f9fa;
        }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Malgun Gothic', sans-serif; overflow: hidden; }
        #wrapper { display: flex; height: 100vh; width: 100vw; }

        /* 사이드바 */
        #sidebar {
            width: var(--sidebar-width);
            background: var(--secondary-color);
            color: white;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 100;
        }
        #sidebar h2 { font-size: 1.1rem; text-align: center; padding: 20px 10px; margin: 0; border-bottom: 1px solid #3e5871; }
        .menu-item {
            padding: 20px;
            cursor: pointer;
            border-left: 5px solid transparent;
            transition: 0.2s;
            font-weight: bold;
        }
        .menu-item:hover { background: #3e5871; }
        .menu-item.active { background: #1a252f; border-left: 5px solid var(--primary-color); color: var(--primary-color); }
        .info-footer { margin-top: auto; padding: 15px; font-size: 0.75rem; color: #95a5a6; text-align: center; }

        /* 메인 영역 */
        #main-content { flex-grow: 1; position: relative; overflow: hidden; background: white; }
        .tool-view { display: none; width: 100%; height: 100%; overflow-y: auto; box-sizing: border-box; }
        .tool-view.active { display: block; }

        /* ---------------------------------------------------- */
        /* [1. 셈돌 시뮬레이터 스타일] */
        .semdol-body { text-align: center; background-color: #f0f8ff; padding: 20px; min-height: 100%; }
        .semdol-body h2 { color: #333; }
        .semdol-body .tabs { margin-bottom: 15px; }
        .semdol-body .tab-btn { padding: 10px 20px; font-size: 16px; cursor: pointer; border: 2px solid #4da6ff; background: white; color: #4da6ff; border-radius: 10px 10px 0 0; margin: 0 5px; }
        .semdol-body .tab-btn.active { background: #4da6ff; color: white; }
        .semdol-body .controls { padding: 20px; background: white; display: inline-block; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .semdol-body #board { position: relative; width: 100%; max-width: 800px; height: 400px; margin: 20px auto; background: white; border: 3px dashed #87ceeb; border-radius: 15px; overflow: hidden; touch-action: none; }
        .semdol-body .stone { position: absolute; width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 900; color: white; font-size: 24px; box-shadow: 2px 4px 8px rgba(0,0,0,0.3); z-index: 10; cursor: grab; transition: transform 0.4s; }
        .semdol-body .positive { background: radial-gradient(circle at 30% 30%, #66b3ff, #1a8cff); border: 2px solid #0066cc; }
        .semdol-body .negative { background: radial-gradient(circle at 30% 30%, #ff9966, #ff5c33); border: 2px solid #cc2900; }
        .semdol-body .group2 { border-style: dashed !important; border-width: 3px !important; }
        .semdol-body .btn-switch { background: #e74c3c; animation: pulse 1.5s infinite; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        /* ---------------------------------------------------- */

        /* [2. 레일바이크 스타일] */
        .rail-body { padding: 30px; background: #f4f7f6; min-height: 100%; text-align: center; }
        .rail-body .scroll-wrapper { width: 100%; overflow-x: auto; margin: 20px 0; border: 1px solid #ddd; background: #fff; border-radius: 10px; }
        .rail-body #rail-viewport { position: relative; width: 16000px; height: 230px; }
        .rail-body #track { position: absolute; top: 90px; left: 0; width: 100%; height: 12px; border-top: 3px solid #555; border-bottom: 3px solid #555; background: #e0e0e0; }
        .rail-body .sleeper { position: absolute; top: -5px; width: 6px; height: 18px; background: #8b4513; border-radius: 2px; }
        .rail-body .tick { position: absolute; top: 115px; width: 3px; height: 12px; background: #999; transform: translateX(-50%); }
        .rail-body .tick-label { position: absolute; top: 140px; transform: translateX(-50%); font-size: 32px; font-weight: 900; }
        .rail-body #train { position: absolute; top: 45px; width: 80px; height: 50px; margin-left: -40px; z-index: 10; transition: all 1.2s ease-in-out; }
        .rail-body .locomotive { width: 60px; height: 35px; background: #2c3e50; border-radius: 5px 15px 5px 5px; position: relative; left: 10px; }
        .rail-body .status-badge { display: inline-block; padding: 6px 18px; background: #2c3e50; color: white; border-radius: 30px; margin: 10px; }
        .rail-body .equation { font-size: 32px; font-weight: 900; margin: 15px 0; }
    </style>
</head>
<body>

<div id="wrapper">
    <div id="sidebar">
        <h2>수학 탐구 도구함</h2>
        <div class="menu-item active" onclick="switchTool('semdol-tool', this)">🔘 셈돌 상쇄 (덧/뺄셈)</div>
        <div class="menu-item" onclick="switchTool('rail-tool', this)">🛤️ 레일바이크 (곱셈)</div>
        <div class="info-footer">정보과학부 양희완<br>와우중학교 수학 수업용</div>
    </div>

    <div id="main-content">
        
        <div id="semdol-tool" class="tool-view active">
            <div class="semdol-body">
                <h3>🔍 셈돌 상쇄 시뮬레이터</h3>
                <div class="tabs">
                    <button id="tab-add" class="tab-btn active" onclick="setMode('add')">➕ 덧셈</button>
                    <button id="tab-sub" class="tab-btn" onclick="setMode('sub')">➖ 뺄셈</button>
                </div>
                <div class="controls">
                    첫 번째: <input type="number" id="num1" value="4" style="width:50px;">
                    두 번째: <input type="number" id="num2" value="-3" style="width:50px;">
                    <button onclick="generateStones()" style="background:#4da6ff; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer;">1. 셈돌 놓기</button>
                    <button id="btn-switch" class="btn-switch" style="display: none;" onclick="flipSign()">2. 부호 스위치</button>
                    <button id="btn-auto" onclick="autoCalculate()" style="background:#ff9933; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer;">2. 자동 상쇄</button>
                </div>
                <div id="board"></div>
                <div id="answerArea">
                    <span id="eq-text" style="font-size:24px; font-weight:bold;">식: </span>
                    <input type="text" id="user-answer" placeholder="+2" style="width:60px; font-size:20px;">
                    <button onclick="checkAnswer()" style="padding:10px; background:#2ecc71; color:white; border:none; border-radius:8px;">확인</button>
                </div>
            </div>
        </div>

        <div id="rail-tool" class="tool-view">
            <div class="rail-body">
                <h3>🛤️ 꼬마 기차 레일 시뮬레이터</h3>
                <div style="background:white; padding:15px; display:inline-block; border-radius:10px; margin-bottom:10px;">
                    <strong>기차 속도:</strong> <input type="number" id="velocity" value="3" style="width:50px; font-size:18px;"> (동쪽 +, 서쪽 -)
                </div>
                <div class="scroll-wrapper" id="scroll-wrapper">
                    <div id="rail-viewport">
                        <div id="track"></div>
                        <div id="train"><div class="locomotive"></div></div>
                    </div>
                </div>
                <div class="controls">
                    <button onclick="moveTime(-1)" style="padding:10px; background:#3498db; color:white; border:none; border-radius:5px;">⬅️ 1초 전</button>
                    <div class="status-badge">현재 시간: <span id="time-val">0</span>초</div>
                    <button onclick="moveTime(1)" style="padding:10px; background:#3498db; color:white; border:none; border-radius:5px;">1초 후 ➡️</button>
                    <button onclick="railReset()" style="padding:10px; background:#999; color:white; border:none; border-radius:5px;">초기화</button>
                </div>
                <div class="equation" id="math-eq">(속도) × (시간) = (위치)</div>
            </div>
        </div>

    </div>
</div>

<script>
    /* [공통: 도구 전환 스크립트] */
    function switchTool(id, el) {
        document.querySelectorAll('.tool-view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if(id === 'rail-tool') setTimeout(updateRail, 100); // 레일바이크 위치 보정
    }

    /* ---------------------------------------------------- */
    /* [1. 셈돌 시뮬레이터 로직] */
    const board = document.getElementById('board');
    let stones = [];
    let currentMode = 'add';
    let isFlipped = false;

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('tab-add').classList.toggle('active', mode === 'add');
        document.getElementById('tab-sub').classList.toggle('active', mode === 'sub');
        generateStones();
    }

    function generateStones() {
        board.innerHTML = ''; stones = []; isFlipped = false;
        const n1 = parseInt(document.getElementById('num1').value) || 0;
        const n2 = parseInt(document.getElementById('num2').value) || 0;
        createStones(n1, 20, 300, 'left');
        createStones(n2, 450, 700, 'right');
        document.getElementById('btn-switch').style.display = (currentMode === 'sub') ? 'inline-block' : 'none';
        document.getElementById('btn-auto').style.display = (currentMode === 'sub') ? 'none' : 'inline-block';
        updateEquation();
    }

    function createStones(num, minX, maxX, side) {
        const count = Math.abs(num);
        const sign = num >= 0 ? '+' : '-';
        const type = num >= 0 ? 'positive' : 'negative';
        for (let i = 0; i < count; i++) {
            const stone = document.createElement('div');
            stone.className = `stone ${type} ${side === 'right' ? 'group2' : ''}`;
            stone.innerText = sign;
            stone.dataset.sign = sign;
            stone.dataset.side = side;
            stone.dataset.active = "true";
            stone.style.left = (Math.random() * (maxX - minX) + minX) + 'px';
            stone.style.top = (Math.random() * 300 + 20) + 'px';
            makeDraggable(stone);
            board.appendChild(stone);
            stones.push(stone);
        }
    }

    function flipSign() {
        stones.filter(s => s.dataset.side === 'right').forEach(s => {
            s.dataset.sign = (s.dataset.sign === '+') ? '-' : '+';
            s.className = `stone ${s.dataset.sign === '+' ? 'positive' : 'negative'} group2`;
            s.innerText = s.dataset.sign;
        });
        isFlipped = true;
        document.getElementById('btn-switch').style.display = 'none';
        document.getElementById('btn-auto').style.display = 'inline-block';
        updateEquation();
    }

    function makeDraggable(el) {
        el.onpointerdown = e => {
            if(currentMode === 'sub' && !isFlipped) return alert("부호 스위치를 먼저 누르세요!");
            let shiftX = e.clientX - el.getBoundingClientRect().left;
            let shiftY = e.clientY - el.getBoundingClientRect().top;
            el.style.zIndex = 1000;
            document.onpointermove = e => {
                let rect = board.getBoundingClientRect();
                el.style.left = Math.max(0, Math.min(e.clientX - rect.left - shiftX, rect.width - 45)) + 'px';
                el.style.top = Math.max(0, Math.min(e.clientY - rect.top - shiftY, rect.height - 45)) + 'px';
                checkCollision(el);
            };
            document.onpointerup = () => { document.onpointermove = null; el.style.zIndex = 10; };
        };
    }

    function checkCollision(s1) {
        for (let s2 of stones) {
            if (s1 !== s2 && s2.dataset.active === "true" && s1.dataset.sign !== s2.dataset.sign) {
                let r1 = s1.getBoundingClientRect(), r2 = s2.getBoundingClientRect();
                if (!(r1.right < r2.left || r1.left > r2.right || r1.bottom < r2.top || r1.top > r2.bottom)) {
                    s1.dataset.active = s2.dataset.active = "false";
                    s1.remove(); s2.remove();
                    stones = stones.filter(s => s.dataset.active === "true");
                    break;
                }
            }
        }
    }

    function autoCalculate() {
        let pos = stones.filter(s => s.dataset.sign === '+'), neg = stones.filter(s => s.dataset.sign === '-');
        let count = Math.min(pos.length, neg.length);
        for(let i=0; i<count; i++) {
            setTimeout(() => { pos[i].remove(); neg[i].remove(); }, i * 200);
        }
        setTimeout(() => { stones = stones.filter(s => s.parentElement); }, count * 200);
    }

    function updateEquation() {
        const n1 = parseInt(document.getElementById('num1').value) || 0;
        const n2 = parseInt(document.getElementById('num2').value) || 0;
        let s1 = n1 >= 0 ? '+'+n1 : n1, s2 = n2 >= 0 ? '+'+n2 : n2;
        if(currentMode === 'add') document.getElementById('eq-text').innerText = `식: (${s1}) + (${s2}) = `;
        else document.getElementById('eq-text').innerText = isFlipped ? `식: (${s1}) + (${n2*-1 >=0 ? '+':''}${n2*-1}) = ` : `식: (${s1}) - (${s2}) = `;
    }

    function checkAnswer() {
        const n1 = parseInt(document.getElementById('num1').value) || 0;
        const n2 = parseInt(document.getElementById('num2').value) || 0;
        const ans = currentMode === 'add' ? n1 + n2 : n1 - n2;
        const user = document.getElementById('user-answer').value.trim();
        if(user == ans || user == (ans > 0 ? '+'+ans : ans)) alert("🎉 정답입니다!");
        else alert("🤔 다시 확인해보세요!");
    }

    /* ---------------------------------------------------- */
    /* [2. 레일바이크 로직] */
    let railTime = 0;
    const unitPx = 80, centerPx = 8000;
    
    function initRail() {
        const vp = document.getElementById('rail-viewport');
        const track = document.getElementById('track');
        for (let i = -100; i <= 100; i++) {
            let x = centerPx + (i * unitPx);
            let s = document.createElement('div'); s.className='sleeper'; s.style.left=x+'px'; track.appendChild(s);
            let t = document.createElement('div'); t.className='tick'; t.style.left=x+'px'; if(i%5===0) t.style.height='20px'; vp.appendChild(t);
            let l = document.createElement('div'); l.className='tick-label'; l.style.left=x+'px'; l.innerText=i; if(i===0) l.style.color='red'; vp.appendChild(l);
        }
    }

    function updateRail(instant = false) {
        const v = parseInt(document.getElementById('velocity').value) || 0;
        const pos = v * railTime;
        const targetX = centerPx + (pos * unitPx);
        const train = document.getElementById('train');
        train.style.transition = instant ? 'none' : 'all 1.2s ease-in-out';
        train.style.left = targetX + 'px';
        train.style.transform = v >= 0 ? 'scaleX(1)' : 'scaleX(-1)';
        
        // 카메라 스크롤 동기화
        const sw = document.getElementById('scroll-wrapper');
        const scrollTarget = targetX - (sw.clientWidth / 2);
        if(instant) sw.scrollLeft = scrollTarget;
        else sw.scrollTo({ left: scrollTarget, behavior: 'smooth' });

        document.getElementById('time-val').innerText = railTime;
        document.getElementById('math-eq').innerText = `(${v >= 0 ? '+' : ''}${v}) × (${railTime >= 0 ? '+' : ''}${railTime}) = ${pos >= 0 ? '+' : ''}${pos}`;
    }

    function moveTime(delta) { railTime += delta; updateRail(); }
    function railReset() { railTime = 0; document.getElementById('velocity').value = 3; updateRail(); }

    // 초기 실행
    window.onload = () => {
        generateStones();
        initRail();
        setTimeout(() => updateRail(true), 200);
    };
</script>
</body>
</html>
